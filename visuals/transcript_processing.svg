<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="760" height="460" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#e6edf3">Transcript Post-Processing — Disfluency &amp; Artefact Handling</text>
  <line x1="60" y1="48" x2="700" y2="48" stroke="#30363d" stroke-width="1"/>

  <!-- ── Column Headers ── -->
  <text x="190" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b949e">RAW ASR OUTPUT</text>
  <text x="380" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b949e">RULE APPLIED</text>
  <text x="570" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b949e">FINAL TRANSCRIPT</text>

  <!-- Column dividers -->
  <line x1="295" y1="58" x2="295" y2="440" stroke="#30363d" stroke-width="1"/>
  <line x1="465" y1="58" x2="465" y2="440" stroke="#30363d" stroke-width="1"/>

  <!-- ══ ROW 1: Whisper annotation ══ -->
  <rect x="65"  y="88" width="220" height="52" rx="6" fill="#161b22" stroke="#f8514940" stroke-width="1.2"/>
  <text x="175" y="109" text-anchor="middle" font-size="11" fill="#cdd9e5">"The man walked</text>
  <text x="175" y="127" text-anchor="middle" font-size="11" fill="#f85149">[Music]</text>
  <text x="175" y="127" text-anchor="middle" font-size="11" fill="#cdd9e5">          to the store"</text>

  <rect x="305" y="88" width="150" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="107" text-anchor="middle" font-size="10" fill="#8b949e">Strip bracketed</text>
  <text x="380" y="121" text-anchor="middle" font-size="10" fill="#8b949e">Whisper annotations</text>
  <text x="380" y="135" text-anchor="middle" font-size="10" font-family="monospace" fill="#58a6ff">re.sub(r'\[.*?\]','')</text>

  <rect x="475" y="88" width="220" height="52" rx="6" fill="#161b22" stroke="#3fb95040" stroke-width="1.2"/>
  <text x="585" y="114" text-anchor="middle" font-size="11" fill="#3fb950">"The man walked to the store"</text>

  <!-- Row 1 arrows -->
  <line x1="285" y1="114" x2="305" y2="114" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="301,110 309,114 301,118" fill="#30363d"/>
  <line x1="455" y1="114" x2="475" y2="114" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="471,110 479,114 471,118" fill="#30363d"/>

  <!-- ══ ROW 2: Filler utterance ══ -->
  <rect x="65"  y="158" width="220" height="52" rx="6" fill="#161b22" stroke="#f8514940" stroke-width="1.2"/>
  <text x="175" y="178" text-anchor="middle" font-size="11" fill="#cdd9e5">"The .. <tspan fill="#f85149">uh</tspan> .. children</text>
  <text x="175" y="196" text-anchor="middle" font-size="11" fill="#cdd9e5">went to school"</text>

  <rect x="305" y="158" width="150" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="174" text-anchor="middle" font-size="10" fill="#8b949e">Replace filler</text>
  <text x="380" y="188" text-anchor="middle" font-size="10" fill="#8b949e">vocalisations with</text>
  <text x="380" y="202" text-anchor="middle" font-size="10" font-family="monospace" fill="#58a6ff">..  (ellipsis)</text>

  <rect x="475" y="158" width="220" height="52" rx="6" fill="#161b22" stroke="#3fb95040" stroke-width="1.2"/>
  <text x="585" y="178" text-anchor="middle" font-size="11" fill="#3fb950">"The .. children</text>
  <text x="585" y="196" text-anchor="middle" font-size="11" fill="#3fb950">went to school"</text>

  <!-- Row 2 arrows -->
  <line x1="285" y1="184" x2="305" y2="184" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="301,180 309,184 301,188" fill="#30363d"/>
  <line x1="455" y1="184" x2="475" y2="184" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="471,180 479,184 471,188" fill="#30363d"/>

  <!-- ══ ROW 3: Silent segment ══ -->
  <rect x="65"  y="228" width="220" height="52" rx="6" fill="#161b22" stroke="#f8514940" stroke-width="1.2"/>
  <text x="175" y="248" text-anchor="middle" font-size="11" fill="#8b949e">( no VAD segment</text>
  <text x="175" y="266" text-anchor="middle" font-size="11" fill="#8b949e">generated )</text>

  <rect x="305" y="228" width="150" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="244" text-anchor="middle" font-size="10" fill="#8b949e">No speech detected</text>
  <text x="380" y="258" text-anchor="middle" font-size="10" fill="#8b949e">→ manual annotation</text>
  <text x="380" y="272" text-anchor="middle" font-size="10" font-family="monospace" fill="#58a6ff">[no response]</text>

  <rect x="475" y="228" width="220" height="52" rx="6" fill="#161b22" stroke="#3fb95040" stroke-width="1.2"/>
  <text x="585" y="254" text-anchor="middle" font-size="11" fill="#3fb950">"[no response]"</text>

  <!-- Row 3 arrows -->
  <line x1="285" y1="254" x2="305" y2="254" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="301,250 309,254 301,258" fill="#30363d"/>
  <line x1="455" y1="254" x2="475" y2="254" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="471,250 479,254 471,258" fill="#30363d"/>

  <!-- ══ ROW 4: Participant grammar error (preserved) ══ -->
  <rect x="65"  y="298" width="220" height="52" rx="6" fill="#161b22" stroke="#d2992240" stroke-width="1.2"/>
  <text x="175" y="318" text-anchor="middle" font-size="11" fill="#cdd9e5">"She go to</text>
  <text x="175" y="336" text-anchor="middle" font-size="11" fill="#cdd9e5">the market yesterday"</text>

  <rect x="305" y="298" width="150" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="313" text-anchor="middle" font-size="10" fill="#8b949e">Participant error —</text>
  <text x="380" y="327" text-anchor="middle" font-size="10" fill="#8b949e">NOT corrected.</text>
  <text x="380" y="341" text-anchor="middle" font-size="10" fill="#d29922">Exact production kept</text>

  <rect x="475" y="298" width="220" height="52" rx="6" fill="#161b22" stroke="#d2992240" stroke-width="1.2"/>
  <text x="585" y="318" text-anchor="middle" font-size="11" fill="#d29922">"She go to</text>
  <text x="585" y="336" text-anchor="middle" font-size="11" fill="#d29922">the market yesterday"</text>

  <!-- Row 4 arrows -->
  <line x1="285" y1="324" x2="305" y2="324" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="301,320 309,324 301,328" fill="#30363d"/>
  <line x1="455" y1="324" x2="475" y2="324" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="471,320 479,324 471,328" fill="#30363d"/>

  <!-- ── Legend ── -->
  <rect x="65" y="368" width="630" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="85" y="389" font-size="11" font-weight="bold" fill="#8b949e">Legend</text>

  <rect x="85" y="399" width="12" height="12" rx="2" fill="#f851491a" stroke="#f85149" stroke-width="1.2"/>
  <text x="103" y="410" font-size="10" fill="#8b949e">ASR artefact or issue — corrected / replaced</text>

  <rect x="85" y="418" width="12" height="12" rx="2" fill="#d2992240" stroke="#d29922" stroke-width="1.2"/>
  <text x="103" y="429" font-size="10" fill="#8b949e">Participant production error — preserved exactly as spoken (task requirement)</text>

  <rect x="370" y="399" width="12" height="12" rx="2" fill="#23863626" stroke="#3fb950" stroke-width="1.2"/>
  <text x="388" y="410" font-size="10" fill="#8b949e">Clean final output</text>
</svg>
